<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lab Scheduler</title>
    <meta name="theme-color" content="#1a1a2e">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-header">
            <div class="header-content">
                <h1>Lab Schedule</h1>
                <button id="addBtn" class="icon-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
            <div class="date-selector">
                <button id="prevDay">&lt;</button>
                <h2 id="currentDateDisplay">Today</h2>
                <button id="nextDay">&gt;</button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="scheduleList" class="schedule-list">
            <!-- Tasks will be injected here via JS -->
            <div class="empty-state">
                <p>No tasks scheduled for this day.</p>
            </div>
        </main>

        <!-- Add Task Modal -->
        <div id="addModal" class="modal hidden">
            <div class="modal-content glass-panel">
                <div class="modal-header">
                    <h2>Add Casting</h2>
                    <button id="closeModal" class="icon-btn">&times;</button>
                </div>
                <form id="addForm">
                    <div class="form-row">
                        <div class="form-group half">
                            <label for="castDate">Cast Date *</label>
                            <input type="date" id="castDate" required>
                        </div>
                        <div class="form-group half">
                            <label for="castTime">Planned Time *</label>
                            <input type="time" id="castTime" value="09:00" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group half">
                            <label for="material">Material / Mix *</label>
                            <input type="text" id="material" placeholder="e.g. Calcined Clay 20%" required>
                        </div>
                        <div class="form-group half">
                            <label for="batchId">Batch ID</label>
                            <input type="text" id="batchId" placeholder="e.g. 20CC-A-C109">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group half">
                            <label for="testStandard">Test Standard *</label>
                            <select id="testStandard" required>
                                <option value="ASTM C109">ASTM C109 — Compressive (cubes)</option>
                                <option value="ASTM C1012">ASTM C1012 — Sulfate</option>
                                <option value="Other">Other / Custom</option>
                            </select>
                        </div>
                        <div class="form-group half">
                            <label for="specimenCount">Specimen Count</label>
                            <input type="number" id="specimenCount" placeholder="12" value="12">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="actionNotes">Action / Notes</label>
                        <textarea id="actionNotes" placeholder="e.g. Adjust w/cm if flow > 120mm" rows="2"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group half">
                            <label for="remarks">Remarks</label>
                            <input type="text" id="remarks" placeholder="optional">
                        </div>
                        <div class="form-group half">
                            <label for="studentAssigned">Student Assigned</label>
                            <input type="text" id="studentAssigned" placeholder="optional">
                        </div>
                    </div>

                    <div class="auto-schedule-box">
                        <div class="auto-schedule-header">
                            <label class="auto-title">Auto-schedule (<span id="autoScheduleTitle">ASTM C109</span>)</label>
                        </div>
                        
                        <div id="c109Options" class="auto-options">
                            <label class="auto-option"><input type="checkbox" id="c109_1day" checked> Demold + 1-day test + clean molds (day 1)</label>
                            <label class="auto-option"><input type="checkbox" id="c109_7day" checked> 7-day compressive test</label>
                            <label class="auto-option"><input type="checkbox" id="c109_28day" checked> 28-day compressive test</label>
                            <label class="auto-option"><input type="checkbox" id="c109_56day" checked> 56-day compressive test</label>
                        </div>

                        <div id="c1012Options" class="auto-options hidden">
                            <label class="auto-option"><input type="checkbox" id="c1012_demold" checked> Demold mortar bars (day 1)</label>
                            <label class="auto-option"><input type="checkbox" id="c1012_week1" checked> Week 1 Measurement & Solution Change</label>
                            <label class="auto-option"><input type="checkbox" id="c1012_week2" checked> Week 2 Measurement & Solution Change</label>
                            <label class="auto-option"><input type="checkbox" id="c1012_week3" checked> Week 3 Measurement & Solution Change</label>
                            <label class="auto-option"><input type="checkbox" id="c1012_week4" checked> Week 4 Measurement & Solution Change</label>
                        </div>
                    </div>

                    <div class="form-group mt-2">
                        <label class="checkbox-label">
                            <input type="checkbox" id="notify" checked>
                            Enable local notifications for these tasks
                        </label>
                    </div>

                    <div class="modal-actions">
                        <button type="submit" class="btn-primary">Add to Schedule</button>
                        <button type="button" class="btn-secondary" id="closeModal">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Notification Permission Banner -->
        <div id="notifyBanner" class="notify-banner hidden">
            <p>Enable notifications to get alerts for your schedule.</p>
            <button id="enableNotifyBtn">Enable</button>
            <button id="dismissNotifyBtn" class="btn-text">Dismiss</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('ServiceWorker registered:', reg.scope);
                }).catch(err => {
                    console.log('ServiceWorker registration failed:', err);
                });
            });
        }
    </script>
</body>
</html>
